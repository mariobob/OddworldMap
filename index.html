<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Oddworld Map</title>
<style>
  :root {
    --bg: #14161a; --panel: #1d2026; --panel2: #23262e; --text: #d8dbe2;
    --dim: #8a8f9c; --accent: #e8a33d; --line: #32363f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font: 13px/1.45 -apple-system, "Segoe UI", sans-serif; display: flex; }
  #sidebar { width: 250px; min-width: 250px; background: var(--panel); border-right: 1px solid var(--line);
             display: flex; flex-direction: column; overflow-y: auto; }
  #sidebar h1 { font-size: 14px; padding: 12px 14px 8px; color: var(--accent); letter-spacing: .04em; }
  #sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim);
                padding: 12px 14px 4px; }
  .btnrow { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 12px; }
  .btnrow button { background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 5px;
                   padding: 4px 8px; cursor: pointer; font-size: 12px; }
  .btnrow button:hover { border-color: var(--accent); }
  .btnrow button.on { background: var(--accent); color: #14161a; border-color: var(--accent); font-weight: 600; }
  .btnrow button.entry::before { content: "\25B8"; color: var(--accent); margin-right: 3px; }
  .btnrow button.entry.on::before { color: #14161a; }
  .filters { padding: 4px 12px 12px; }
  .filters label { display: flex; align-items: center; gap: 7px; padding: 2.5px 2px; cursor: pointer; user-select: none; }
  .filters .sw { width: 11px; height: 11px; border-radius: 3px; display: inline-block; flex: none; }
  .filters .cnt { margin-left: auto; color: var(--dim); font-size: 11px; }
  #toggles { padding: 0 12px 10px; }
  #toggles label { display: flex; align-items: center; gap: 7px; padding: 2.5px 2px; cursor: pointer; }
  #exportBtn { margin: 6px 12px 2px; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
               border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; width: calc(100% - 24px); }
  #exportBtn:hover { border-color: var(--accent); }
  #main { flex: 1; position: relative; }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
  #cv.panning { cursor: grabbing; }
  #tip { position: absolute; pointer-events: none; background: rgba(18,20,24,.94); border: 1px solid var(--line);
         border-radius: 6px; padding: 8px 10px; font-size: 12px; max-width: 340px; display: none; z-index: 5;
         box-shadow: 0 4px 18px rgba(0,0,0,.5); }
  #tip .t { color: var(--accent); font-weight: 600; }
  #tip .e { color: var(--dim); }
  #tip .f { color: var(--accent); }
  #hud { position: absolute; right: 10px; bottom: 8px; color: var(--dim); font-size: 11px;
         background: rgba(18,20,24,.7); padding: 3px 8px; border-radius: 5px; }
  #help { position: absolute; left: 10px; bottom: 8px; color: var(--dim); font-size: 11px;
          background: rgba(18,20,24,.7); padding: 3px 8px; border-radius: 5px; }
  .muted { color: var(--dim); padding: 2px 14px 8px; font-size: 11px; }
  #searchBox { margin: 4px 12px 2px; }
  #searchBox input { width: 100%; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px;
                     color: var(--text); padding: 6px 9px; font-size: 12px; outline: none; }
  #searchBox input:focus { border-color: var(--accent); }
  #searchResults { padding: 2px 6px 10px; }
  #searchResults .hit { display: block; width: 100%; text-align: left; background: none; border: 0;
                        color: var(--text); padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  #searchResults .hit:hover, #searchResults .hit.active { background: var(--panel2); }
  #searchResults .hit mark { background: none; color: var(--accent); font-weight: 600; }
  #searchResults .hit .loc { color: var(--accent); }
  #searchResults .hit .ex { color: var(--dim); }
  #searchResults .more { color: var(--dim); font-size: 11px; padding: 3px 8px; }
  #scopeBar { display: flex; gap: 4px; margin: 6px 12px 0; }
  #scopeBar button { background: var(--panel2); color: var(--dim); border: 1px solid var(--line); border-radius: 5px;
                     padding: 2px 8px; cursor: pointer; font-size: 11px; }
  #scopeBar button.on { background: var(--accent); color: #14161a; border-color: var(--accent); font-weight: 600; }
  #searchResults .widen { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #searchResults .shead { display: flex; justify-content: space-between; color: var(--dim); font-size: 10px;
                          text-transform: uppercase; letter-spacing: .07em; padding: 7px 8px 2px; }
  #searchResults .showmore { display: block; width: 100%; text-align: left; background: none; border: 0;
                             color: var(--accent); padding: 2px 8px 4px; cursor: pointer; font-size: 11px; }
  #searchResults .showmore:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="sidebar">
  <h1>ODDWORLD MAP</h1>
  <div class="muted" id="gameName"></div>
  <h2>Search</h2>
  <div id="searchBox"><input id="searchInput" type="search" placeholder="mudokon, lcdstatusboard, switch_id=70…" autocomplete="off"></div>
  <div id="scopeBar"></div>
  <div id="searchResults"></div>
  <h2>Game</h2>
  <div class="btnrow" id="gameBtns"></div>
  <h2>Level</h2>
  <div class="btnrow" id="levelBtns"></div>
  <h2>Path</h2>
  <div class="btnrow" id="pathBtns"></div>
  <h2>Display</h2>
  <div id="toggles">
    <label><input type="checkbox" id="tGrid" checked> Camera grid + names</label>
    <label><input type="checkbox" id="tColl"> Collision lines</label>
    <label><input type="checkbox" id="tFg"> Foreground masks (FG1)</label>
    <label><input type="checkbox" id="tLabels" checked> Object labels (zoomed)</label>
    <label><input type="checkbox" id="tDim"> Dim backgrounds</label>
    <label><input type="checkbox" id="tRuler"> Ruler (drag to measure)</label>
    <button id="exportBtn" title="save the current view as an image">Export view as PNG</button>
  </div>
  <h2>Objects <span style="float:right"><a href="#" id="fAll" style="color:var(--dim)">all</a> · <a href="#" id="fNone" style="color:var(--dim)">none</a></span></h2>
  <div class="filters" id="filterBox"></div>
</div>
<div id="main">
  <canvas id="cv"></canvas>
  <div id="tip"></div>
  <div id="help">drag = pan · wheel = zoom · hover = inspect</div>
  <div id="hud"></div>
</div>

<script src="map_data_ao.js" onerror="this.remove()"></script>
<script src="map_data_ae.js" onerror="this.remove()"></script>
<script>
// Each game maps world coordinates to screen artwork differently (data.geometry):
// AO cameras occupy 1024x480-unit world cells with a 368x240 window at +256/+120
// (1:1 world:pixel; Map.cpp SetActiveCam + ScreenManager xpos/ypos); AE cameras
// are 375x260-unit cells shown scaled into 368x240. Screens are laid out edge to
// edge at cellW x cellH pitch either way.
let CELL_W = 368, CELL_H = 240;
let GEO = null, SX = 1, SY = 1;

function setGeometry(g) {
  GEO = g;
  CELL_W = g.cellW; CELL_H = g.cellH;
  SX = g.cellW / g.visW; SY = g.cellH / g.visH;
}

let GAMES_DATA = [];   // one dataset per available game
let DATA = null;       // current game's dataset
let ENTRY = {};        // per game: level short -> Set of path ids arrived into from other levels

function computeEntryPaths(data) {
  const entries = {};
  const add = (lv, pa) => { if (lv != null && pa != null) (entries[lv] ??= new Set()).add(pa); };
  for (const L of data.levels)
    for (const P of L.paths)
      for (const t of P.tlvs) {
        const e = t.extra || {};
        if (e.to_level && e.to_level !== L.short) add(e.to_level, e.to_path);
        if (e.alt_level && e.alt_level !== L.short) add(e.alt_level, e.alt_path);
        if (t.t === (data.id === "AE" ? 22 : 37)) add(L.short, P.id);   // AbeStart (game start / re-entry)
      }
  return entries;
}

function dX(wx) { const c = Math.floor(wx / GEO.worldW); return c * CELL_W + (wx - c * GEO.worldW - GEO.winX) * SX; }
function dY(wy) { const c = Math.floor(wy / GEO.worldH); return c * CELL_H + (wy - c * GEO.worldH - GEO.winY) * SY; }
function wX(dx) { const c = Math.floor(dx / CELL_W); return c * GEO.worldW + GEO.winX + (dx - c * CELL_W) / SX; }
function wY(dy) { const c = Math.floor(dy / CELL_H); return c * GEO.worldH + GEO.winY + (dy - c * CELL_H) / SY; }

// ---- categories (matched by TLV name so both games share the buckets) ----
const CATS = [
  { key:"board",  label:"LCD Status Boards", color:"#ff3860", on:true, names:["LCDStatusBoard"] },
  { key:"mud",    label:"Mudokons",          color:"#3ec6ff", on:true, names:["Mudokon","SlingMudokon","RingMudokon","LiftMudokon","MudokonPathTrans","TorturedMudokon"] },
  { key:"door",   label:"Doors / Transitions", color:"#ffd23e", on:true, names:["Door","PathTransition","BirdPortal","BirdPortalExit","WellLocal","LocalWell","WellExpress","Teleporter","TrainDoor","SlamDoor","MineCar"] },
  { key:"cont",   label:"Continue points",   color:"#ffffff", on:true, names:["ContinuePoint","AbeStart","ElumStart"] },
  { key:"switch", label:"Switches / levers", color:"#5dde75", on:true, names:["Switch","Lever","InvisibleSwitch","FootSwitch","BellHammer","HandStone","IdSplitter","SecurityOrb","SecurityDoor","BellSongStone","ChimeLock","MovieHandStone","GlukkonSwitch","CrawlingSligButton","MultiSwitchController","WheelSyncer","WorkWheel","SlapLock"] },
  { key:"hazard", label:"Hazards",           color:"#ff8b3d", on:true, names:["DeathDrop","TimedMine","Mine","UXB","ElectricWall","DoorFlame","MovingBomb","MeatSaw","BoomMachine","DeathClock","GasEmitter","GasCountdown","TrapDoor","FallingItem","RollingBall","RollingRock","ZBall","Drill","LaughingGas","ExplosionSet","BrewMachine","Water"] },
  { key:"enemy",  label:"Enemies / spawners", color:"#c85dff", on:true, names:["Slig","Slog","Paramite","Scrab","Bat","Bees","SligSpawner","SlogSpawner","ScrabSpawner","Glukkon","SlogHut","FlyingSlig","FlyingSligSpawner","CrawlingSlig","Fleech","Slurg","SlurgSpawner","ZzzSpawner","Greeter","SligGetPants","SligGetWings","BeeSwarmHole"] },
  { key:"screen", label:"Screens / pickups", color:"#3effc8", on:false, names:["LCDScreen","LCD","MovieStone","HintFly","DemoPlaybackStone","Honey","HoneySack","HoneyDripTarget","MeatSack","RockSack","BoneBag","Dove","StatusLight","ColourfulMeter"] },
  { key:"nav",    label:"Hoists / edges / lifts", color:"#8f9bb3", on:false, names:["Hoist","Edge","LiftPoint","LiftMover","Pulley","PullRingRope","ElumWall","ScrabNoFall","RollingBallStopper","FlintLockFire","ParamiteWebLine"] },
  { key:"meta",   label:"Meta / bounds / fx", color:"#5b6270", on:false, names:[] },   // fallback for everything else
];
const NAME_CAT = {};
CATS.forEach(c => c.names.forEach(n => NAME_CAT[n] = c));
const META_CAT = CATS[CATS.length - 1];
const catOf = t => NAME_CAT[t.name] || META_CAT;

// ---- state ------------------------------------------------------------
let lvl = null, path = null;
let cam = { x: 0, y: 0, z: 0.3 };   // world offset + zoom (px per unit)
const images = {};                   // png -> Image
let hoverTlvs = [], mouse = {x:0,y:0};
let panMoved = false;
let flash = null;          // {x, y, t0} follow-destination highlight
let ruler = null;          // {x1, y1, x2, y2} in draw space
let measuring = false;

const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const tip = document.getElementById("tip"), hud = document.getElementById("hud");

function resize() {
  cv.width = cv.clientWidth * devicePixelRatio;
  cv.height = cv.clientHeight * devicePixelRatio;
  draw();
}
window.addEventListener("resize", resize);

// ---- UI build ---------------------------------------------------------
const gameBtns = document.getElementById("gameBtns");
const levelBtns = document.getElementById("levelBtns");
const pathBtns = document.getElementById("pathBtns");

function selectGame(G, btn, keepView) {
  DATA = G;
  setGeometry(G.geometry);
  [...gameBtns.children].forEach(x => x.classList.remove("on"));
  if (btn) btn.classList.add("on");
  document.getElementById("gameName").textContent = G.game;
  ENTRY = computeEntryPaths(G);
  levelBtns.innerHTML = "";
  G.levels.forEach(L => {
    const b = document.createElement("button");
    b.textContent = L.short;
    b.title = L.name;
    b.onclick = () => selectLevel(L, b);
    levelBtns.appendChild(b);
  });
  if (!keepView && G.levels.length) selectLevel(G.levels[0], levelBtns.children[0]);
}

function selectLevel(L, btn) {
  lvl = L;
  [...levelBtns.children].forEach(x => x.classList.remove("on"));
  btn.classList.add("on");
  pathBtns.innerHTML = "";
  L.paths.forEach(P => {
    const b = document.createElement("button");
    b.textContent = "P" + P.id;
    if (ENTRY[L.short] && ENTRY[L.short].has(P.id)) {
      b.classList.add("entry");
      b.title = "entry point (arrived at from another level)";
    }
    b.onclick = () => selectPath(P, b);
    pathBtns.appendChild(b);
  });
  if (L.paths.length) selectPath(L.paths[0], pathBtns.children[0]);
}

function selectPath(P, btn) {
  path = P;
  [...pathBtns.children].forEach(x => x.classList.remove("on"));
  if (btn) btn.classList.add("on");
  fitView();
  updateCounts();
  updateScopeBar();
  draw();
  scheduleHash(true);
}

let camToken = 0;   // bumped on explicit positioning to invalidate pending fits

function fitView() {
  const token = ++camToken;
  const attempt = () => {
    if (token !== camToken) return;   // superseded by hash restore or follow
    if (!cv.clientWidth || !cv.clientHeight) { requestAnimationFrame(attempt); return; }
    const w = path.w * CELL_W, h = path.h * CELL_H;
    const zx = cv.clientWidth / (w + 200), zy = cv.clientHeight / (h + 200);
    cam.z = Math.max(0.02, Math.min(zx, zy));
    cam.x = -(cv.clientWidth / cam.z - w) / 2;
    cam.y = -(cv.clientHeight / cam.z - h) / 2;
    draw();
  };
  attempt();
}

// filters
const filterBox = document.getElementById("filterBox");
CATS.forEach(c => {
  const lab = document.createElement("label");
  lab.innerHTML = `<span class="sw" style="background:${c.color}"></span>
    <input type="checkbox" ${c.on ? "checked" : ""} style="display:none">
    <span>${c.label}</span><span class="cnt"></span>`;
  const cb = lab.querySelector("input");
  lab.onclick = (e) => { e.preventDefault(); c.on = !c.on; lab.style.opacity = c.on ? 1 : .45; draw(); };
  filterBox.appendChild(lab);
  c._lab = lab;
});
document.getElementById("fAll").onclick = e => { e.preventDefault(); CATS.forEach(c => { c.on = true; c._lab.style.opacity = 1; }); draw(); };
document.getElementById("fNone").onclick = e => { e.preventDefault(); CATS.forEach(c => { c.on = false; c._lab.style.opacity = .45; }); draw(); };
["tGrid","tColl","tFg","tLabels","tDim"].forEach(id => document.getElementById(id).onchange = draw);
document.getElementById("exportBtn").onclick = () => {
  cv.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `oddworld-${DATA.id.toLowerCase()}${lvl ? "-" + lvl.short : ""}${path ? "-P" + path.id : ""}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  }, "image/png");
};

document.getElementById("tRuler").onchange = () => {
  if (!document.getElementById("tRuler").checked) ruler = null;
  cv.style.cursor = document.getElementById("tRuler").checked ? "crosshair" : "";
  draw();
};

function updateCounts() {
  const counts = {};
  path.tlvs.forEach(t => { const c = catOf(t); counts[c.key] = (counts[c.key] || 0) + 1; });
  CATS.forEach(c => c._lab.querySelector(".cnt").textContent = counts[c.key] || "");
}

// ---- follow (click a door/portal/well to jump to its destination) -----
function destOf(t) {
  const e = t.extra || {};
  const mk = (lv, pa, ca, door) => (lv != null && pa != null) ? { lv, pa, ca, door } : null;
  const a = mk(e.to_level, e.to_path, e.to_cam, e["target_door#"]);
  const b = mk(e.alt_level, e.alt_path, e.alt_cam, null);
  const differs = d => d && !(lvl && path && d.lv === lvl.short && d.pa === path.id && d.door == null);
  return differs(a) ? a : (differs(b) ? b : (a || b));
}

function selectPathById(id) {
  const idx = lvl.paths.findIndex(p => p.id === id);
  if (idx < 0) return false;
  selectPath(lvl.paths[idx], pathBtns.children[idx]);
  return true;
}

function navigateToDest(d) {
  if (!cv.clientWidth) { requestAnimationFrame(() => navigateToDest(d)); return; }
  const L = DATA.levels.find(l => l.short === d.lv);
  if (!L) return;
  if (lvl !== L) selectLevel(L, levelBtns.children[DATA.levels.indexOf(L)]);
  if (!selectPathById(d.pa)) return;

  // door numbers are only unique per camera, so resolve the destination
  // camera cell first and match the target door inside it
  let cell = null;
  if (d.ca != null) {
    const suffix = "C" + String(d.ca).padStart(2, "0");
    const cm = path.cams.find(c => c.name && c.name.endsWith(suffix));
    if (cm) cell = cm.cell;
  }
  let fx = null, fy = null;
  if (d.door != null) {
    const inCell = t => cell == null ||
      (Math.floor(t.x1 / GEO.worldW) === cell % path.w && Math.floor(t.y1 / GEO.worldH) === Math.floor(cell / path.w));
    const tgt = path.tlvs.find(t => t.t === 6 && (t.extra || {})["door#"] === d.door && inCell(t));
    if (tgt) { fx = dX(tgt.x1) + (tgt.x2 - tgt.x1) / 2; fy = dY(tgt.y1) + (tgt.y2 - tgt.y1) / 2; }
  }
  if (fx == null && cell != null) {
    fx = (cell % path.w) * CELL_W + CELL_W / 2;
    fy = Math.floor(cell / path.w) * CELL_H + CELL_H / 2;
  }
  if (fx == null) return;   // path-level target: selectPath already fit the view

  cam.z = Math.max(0.5, Math.min(1.6, Math.min(cv.clientWidth / (2.6 * CELL_W), cv.clientHeight / (2.6 * CELL_H))));
  cam.x = fx - cv.clientWidth / (2 * cam.z);
  cam.y = fy - cv.clientHeight / (2 * cam.z);
  camToken++;   // cancel any fit still waiting on layout
  flash = { x: fx, y: fy, t0: performance.now() };
  animateFlash();
  scheduleHash(true);
}

function animateFlash() {
  if (!flash) return;
  if (performance.now() - flash.t0 > 1600) { flash = null; draw(); return; }
  draw();
  requestAnimationFrame(animateFlash);
}

// ---- global search ------------------------------------------------------
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");
let searchTimer = null;

function tlvSearchText(t) {
  const ex = Object.entries(t.extra || {}).map(([k, v]) => `${k}=${v}`).join(" ");
  return (t.name + " " + ex).toLowerCase();
}

const HIT_CAP = 1500, GROUP_MAX = 8;
const scopeBar = document.getElementById("scopeBar");
let searchScope = "all";   // all | game | level | path (relative to the current selection)

function scopeAccepts(h) {
  if (searchScope === "game") return h.G === DATA;
  if (searchScope === "level") return h.G === DATA && h.L === lvl;
  if (searchScope === "path") return h.G === DATA && h.L === lvl && h.P === path;
  return true;
}

function scopeLabel() {
  return { all: "everywhere", game: DATA.id, level: `${DATA.id} · ${lvl.short}`,
           path: `${DATA.id} · ${lvl.short} P${path.id}` }[searchScope];
}

function updateScopeBar() {
  if (!DATA || !lvl || !path) return;
  scopeBar.innerHTML = "";
  for (const [key, label] of [["all", "All"], ["game", DATA.id], ["level", lvl.short], ["path", "P" + path.id]]) {
    const b = document.createElement("button");
    b.textContent = label;
    if (searchScope === key) b.classList.add("on");
    b.onclick = () => { searchScope = key; updateScopeBar(); runSearch(searchInput.value); };
    scopeBar.appendChild(b);
  }
}

function esc(t) { return t.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function highlight(text, q) {
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
}

// match quality: exact name, name prefix, name substring, extras-only
function matchRank(t, q) {
  const n = t.name.toLowerCase();
  if (n === q) return 0;
  if (n.startsWith(q)) return 1;
  if (n.includes(q)) return 2;
  return 3;
}

function hitButton(h, q) {
  const b = document.createElement("button");
  b.className = "hit";
  const ex = Object.entries(h.t.extra || {}).filter(([k, v]) => v !== null && v !== "")
    .map(([k, v]) => `${k}=${v}`).join(" ");
  b.innerHTML = `<span class="loc">${h.L.short} P${h.P.id}</span> ${highlight(h.t.name, q)}` +
                (ex ? ` <span class="ex">${highlight(ex, q)}</span>` : "");
  b.onclick = () => jumpToTlv(h.G, h.L, h.P, h.t);
  return b;
}

function runSearch(q) {
  searchResults.innerHTML = "";
  q = q.trim().toLowerCase();
  if (q.length < 2) { searchScope = "all"; updateScopeBar(); return; }

  const hits = [];
  outer:
  for (const G of GAMES_DATA)
    for (const L of G.levels)
      for (const P of L.paths)
        for (const t of P.tlvs)
          if (tlvSearchText(t).includes(q)) {
            const h = { G, L, P, t };
            if (!scopeAccepts(h)) continue;
            hits.push(h);
            if (hits.length >= HIT_CAP) break outer;
          }

  // group by context: current path, then current level, then per game
  const groups = [];
  const byKey = {};
  const group = (key, label) => byKey[key] ||
    (byKey[key] = groups[groups.push({ label, hits: [] }) - 1]);
  if (path) group("p", `${DATA.id} · ${lvl.short} P${path.id}`);
  if (lvl) group("l", `${DATA.id} · ${lvl.short}`);
  for (const G of [DATA, ...GAMES_DATA.filter(G => G !== DATA)]) group("g" + G.id, G.id);
  for (const h of hits) {
    if (h.G === DATA && h.L === lvl && h.P === path) group("p").hits.push(h);
    else if (h.G === DATA && h.L === lvl) group("l").hits.push(h);
    else group("g" + h.G.id).hits.push(h);
  }

  for (const g of groups) {
    if (!g.hits.length) continue;
    g.hits.sort((a, b) => matchRank(a.t, q) - matchRank(b.t, q));
    const head = document.createElement("div");
    head.className = "shead";
    head.innerHTML = `<span>${g.label}</span><span>${g.hits.length}</span>`;
    searchResults.appendChild(head);
    g.hits.slice(0, GROUP_MAX).forEach(h => searchResults.appendChild(hitButton(h, q)));
    if (g.hits.length > GROUP_MAX) {
      const rest = g.hits.slice(GROUP_MAX);
      const btn = document.createElement("button");
      btn.className = "showmore";
      btn.textContent = `show ${rest.length} more`;
      btn.onclick = () => { rest.forEach(h => searchResults.insertBefore(hitButton(h, q), btn)); btn.remove(); };
      searchResults.appendChild(btn);
    }
  }

  const more = document.createElement("div");
  more.className = "more";
  const perGame = GAMES_DATA.map(G => `${G.id} ${hits.filter(h => h.G === G).length}`).join(" · ");
  const summary = hits.length
    ? `${hits.length}${hits.length >= HIT_CAP ? "+" : ""} hit${hits.length === 1 ? "" : "s"}` +
      (searchScope === "all" ? ` — ${perGame}` : ` in ${scopeLabel()}`)
    : (searchScope === "all" ? "no hits" : `no hits in ${scopeLabel()}`);
  more.textContent = summary + (searchScope === "all" ? "" : " — ");
  if (searchScope !== "all") {
    const widen = document.createElement("span");
    widen.className = "widen";
    widen.textContent = "search everywhere";
    widen.onclick = () => { searchScope = "all"; updateScopeBar(); runSearch(searchInput.value); };
    more.appendChild(widen);
  }
  searchResults.appendChild(more);
}

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => runSearch(searchInput.value), 160);
});

// keyboard: "/" focuses search, Esc clears, arrows walk results, Enter jumps
let activeHit = -1;
function visibleHits() { return [...searchResults.querySelectorAll(".hit")]; }
function setActiveHit(i) {
  const hits = visibleHits();
  hits.forEach(b => b.classList.remove("active"));
  activeHit = Math.max(-1, Math.min(i, hits.length - 1));
  if (activeHit >= 0) {
    hits[activeHit].classList.add("active");
    hits[activeHit].scrollIntoView({ block: "nearest" });
  }
}
window.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }
  if (document.activeElement !== searchInput) return;
  if (e.key === "Escape") { searchInput.value = ""; runSearch(""); searchInput.blur(); setActiveHit(-1); }
  else if (e.key === "ArrowDown") { e.preventDefault(); setActiveHit(activeHit + 1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); setActiveHit(activeHit - 1); }
  else if (e.key === "Enter") {
    const hits = visibleHits();
    (hits[activeHit] || hits[0])?.click();
  } else { activeHit = -1; }
});

function jumpToTlv(G, L, P, t) {
  if (DATA !== G) selectGame(G, gameBtns.children[GAMES_DATA.indexOf(G)], true);
  if (lvl !== L) selectLevel(L, levelBtns.children[G.levels.indexOf(L)]);
  if (path !== P) selectPathById(P.id);
  const fx = dX(t.x1) + (t.x2 - t.x1) / 2, fy = dY(t.y1) + (t.y2 - t.y1) / 2;
  cam.z = Math.max(0.5, Math.min(1.6, Math.min(cv.clientWidth / (2.6 * CELL_W), cv.clientHeight / (2.6 * CELL_H))));
  cam.x = fx - cv.clientWidth / (2 * cam.z);
  cam.y = fy - cv.clientHeight / (2 * cam.z);
  camToken++;
  flash = { x: fx, y: fy, t0: performance.now() };
  animateFlash();
  scheduleHash(true);
}

// ---- permalinks: #LEVEL/PATH/x/y/zoom ----------------------------------
let applyingHash = false, hashTimer = null;

function hashFor() {
  return `#${DATA.id}/${lvl.short}/${path.id}/${Math.round(cam.x)}/${Math.round(cam.y)}/${cam.z.toFixed(2)}`;
}

function scheduleHash(push) {
  if (applyingHash || !path) return;
  clearTimeout(hashTimer);
  hashTimer = setTimeout(() => {
    const h = hashFor();
    if (h === location.hash) return;
    if (push) location.hash = h;                 // history entry (level/path/follow)
    else history.replaceState(null, "", h);      // silent update (pan/zoom)
  }, push ? 0 : 350);
}

function applyHash() {
  let h = location.hash.replace(/^#/, "");
  if (!h) return false;
  let parts = h.split("/");
  const G = GAMES_DATA.find(g => g.id === parts[0].toUpperCase());
  if (!G) return false;
  parts = parts.slice(1);
  const L = G.levels.find(l => l.short === (parts[0] || "").toUpperCase());
  if (!L) return false;
  applyingHash = true;
  if (DATA !== G) selectGame(G, gameBtns.children[GAMES_DATA.indexOf(G)], true);
  if (lvl !== L) selectLevel(L, levelBtns.children[G.levels.indexOf(L)]);
  if (!selectPathById(+parts[1])) { applyingHash = false; return false; }
  if (parts[2] != null && parts.length >= 5) {
    cam.x = +parts[2]; cam.y = +parts[3];
    cam.z = Math.max(0.02, Math.min(4, +parts[4]));
    camToken++;   // cancel any fit still waiting on layout
  }
  applyingHash = false;
  draw();
  return true;
}

window.addEventListener("hashchange", () => { if (!applyingHash) applyHash(); });

// ---- interaction ------------------------------------------------------
let panning = false, panStart = null;
cv.addEventListener("mousedown", e => {
  if (document.getElementById("tRuler").checked) {
    const w = worldAtMouse();
    ruler = { x1: w.x, y1: w.y, x2: w.x, y2: w.y };
    measuring = true;
    draw();
    return;
  }
  panning = true; panMoved = false; cv.classList.add("panning"); panStart = { x: e.clientX, y: e.clientY, cx: cam.x, cy: cam.y };
});
cv.addEventListener("click", () => {
  if (panMoved || document.getElementById("tRuler").checked) return;
  for (const t of hoverTlvs) {
    const d = destOf(t);
    if (d) { navigateToDest(d); return; }
  }
});
window.addEventListener("mouseup", () => { measuring = false; if (panning && panMoved) scheduleHash(false); panning = false; cv.classList.remove("panning"); });
window.addEventListener("mousemove", e => {
  const r = cv.getBoundingClientRect();
  mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
  if (measuring && ruler) {
    const w = worldAtMouse();
    ruler.x2 = w.x; ruler.y2 = w.y;
  }
  if (panning) {
    if (Math.abs(e.clientX - panStart.x) + Math.abs(e.clientY - panStart.y) > 4) panMoved = true;
    cam.x = panStart.cx - (e.clientX - panStart.x) / cam.z;
    cam.y = panStart.cy - (e.clientY - panStart.y) / cam.z;
  }
  updateHover();
  draw();
});
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const f = Math.exp(-e.deltaY * 0.0015);
  const wx = cam.x + mouse.x / cam.z, wy = cam.y + mouse.y / cam.z;
  cam.z = Math.min(4, Math.max(0.02, cam.z * f));
  cam.x = wx - mouse.x / cam.z;
  cam.y = wy - mouse.y / cam.z;
  updateHover();
  draw();
  scheduleHash(false);
}, { passive: false });

function worldAtMouse() { return { x: cam.x + mouse.x / cam.z, y: cam.y + mouse.y / cam.z }; }

function updateHover() {
  if (!path) return;
  const w = worldAtMouse();
  let hoverLines = [];
  if (document.getElementById("tColl").checked) {
    const tol = 6 / cam.z;
    hoverLines = path.lines.filter(([x1, y1, x2, y2]) =>
      segDist(w.x, w.y, dX(x1), dY(y1), dX(x2), dY(y2)) <= tol).slice(0, 4);
  }
  hoverTlvs = path.tlvs.filter(t => {
    const c = catOf(t);
    if (!c.on) return false;
    const x1 = dX(t.x1), y1 = dY(t.y1);
    const x2 = Math.max(x1 + (t.x2 - t.x1), x1 + 8), y2 = Math.max(y1 + (t.y2 - t.y1), y1 + 8);
    return w.x >= x1 - 4 && w.x <= x2 + 4 && w.y >= y1 - 4 && w.y <= y2 + 4;
  });
  if (hoverTlvs.length || hoverLines.length) {
    tip.style.display = "block";
    const px = Math.min(mouse.x + 16, cv.clientWidth - 350);
    tip.style.left = px + "px";
    tip.style.top = (mouse.y + 16) + "px";
    tip.innerHTML = hoverTlvs.slice(0, 8).map(t => {
      const ex = Object.entries(t.extra || {}).filter(([k,v]) => v !== null && v !== "")
        .map(([k, v]) => `${k}=${v}`).join("  ");
      const d = destOf(t);
      return `<div><span class="t">${t.name}</span> <span class="e">(${t.x1},${t.y1})–(${t.x2},${t.y2})</span>` +
             (ex ? `<br><span class="e">${ex}</span>` : "") +
             (d ? `<br><span class="f">➜ click to follow to ${d.lv} P${d.pa}${d.ca != null ? " C" + d.ca : ""}</span>` : "") + `</div>`;
    }).concat(hoverLines.map(([x1, y1, x2, y2, t]) => {
      const len = Math.round(Math.hypot(x2 - x1, y2 - y1));
      return `<div><span class="t" style="color:${LINE_COLORS[t] || '#999'}">${LINE_NAMES[t] || "Line type " + t}</span>` +
             ` <span class="e">(${x1},${y1})→(${x2},${y2}) · ${len}u ≈ ${(len / 25).toFixed(1)} grid</span></div>`;
    })).join("<hr style='border:0;border-top:1px solid #32363f;margin:5px 0'>")
      + (hoverTlvs.length > 8 ? `<div class="e">+${hoverTlvs.length - 8} more…</div>` : "");
    if (!panning) cv.style.cursor = hoverTlvs.some(t => destOf(t)) ? "pointer" : "";
  } else {
    tip.style.display = "none";
    if (!panning) cv.style.cursor = "";
  }
  hud.textContent = `world x ${Math.round(wX(w.x))}  y ${Math.round(wY(w.y))}  ·  zoom ${cam.z.toFixed(2)}`;
}

// ---- drawing ----------------------------------------------------------
function img(src) {
  if (!images[src]) {
    const im = new Image();
    im.src = src;
    im.onload = draw;
    images[src] = im;
  }
  return images[src];
}

const LINE_COLORS = { 0:"#43d94c", 1:"#ff5c5c", 2:"#ff9d3d", 3:"#5ca9ff", 4:"#2b8f33", 5:"#a33c3c", 6:"#a3702b" };
const LINE_NAMES = { 0:"Floor", 1:"Wall (left)", 2:"Wall (right)", 3:"Ceiling",
                     4:"Background floor", 5:"Background wall (left)", 6:"Background wall (right)" };

function segDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy || 1)));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

const tintCache = {};
function tintedImg(src) {
  if (tintCache[src]) return tintCache[src];
  const im = img(src);
  if (!im.complete || !im.naturalWidth) return null;   // retried next draw
  const oc = document.createElement("canvas");
  oc.width = im.naturalWidth; oc.height = im.naturalHeight;
  const octx = oc.getContext("2d");
  octx.drawImage(im, 0, 0);
  octx.globalCompositeOperation = "source-in";
  octx.fillStyle = "#ff4fd8";
  octx.fillRect(0, 0, oc.width, oc.height);
  tintCache[src] = oc;
  return oc;
}

function draw() {
  if (!path) { ctx.fillStyle = "#14161a"; ctx.fillRect(0, 0, cv.width, cv.height); return; }
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.fillStyle = "#0e0f12";
  ctx.fillRect(0, 0, cv.clientWidth, cv.clientHeight);
  ctx.save();
  ctx.scale(cam.z, cam.z);
  ctx.translate(-cam.x, -cam.y);

  const dim = document.getElementById("tDim").checked;

  // cameras
  ctx.imageSmoothingEnabled = cam.z < 1;
  for (const c of path.cams) {
    const cx = (c.cell % path.w) * CELL_W, cy = Math.floor(c.cell / path.w) * CELL_H;
    if (c.png) {
      const im = img(c.png);
      if (im.complete && im.naturalWidth) {
        ctx.globalAlpha = dim ? 0.35 : 1;
        // source is 384px wide (24 MDEC macroblocks); only the first 368 columns are real
        ctx.drawImage(im, 0, 0, CELL_W, CELL_H, cx, cy, CELL_W, CELL_H);
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.fillStyle = "#1a1d22";
      ctx.fillRect(cx, cy, CELL_W, CELL_H);
    }
  }

  // foreground occlusion masks, tinted so they stand out from the identical background art
  if (document.getElementById("tFg").checked) {
    for (const c of path.cams) {
      if (!c.fg) continue;
      const t = tintedImg(c.fg);
      if (!t) continue;
      const cx = (c.cell % path.w) * CELL_W, cy = Math.floor(c.cell / path.w) * CELL_H;
      ctx.globalAlpha = 0.6;
      ctx.drawImage(t, cx, cy, CELL_W, CELL_H);
      ctx.globalAlpha = 1;
    }
  }

  // grid + names
  if (document.getElementById("tGrid").checked) {
    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 1.5 / cam.z;
    for (let gx = 0; gx <= path.w; gx++) { ctx.beginPath(); ctx.moveTo(gx * CELL_W, 0); ctx.lineTo(gx * CELL_W, path.h * CELL_H); ctx.stroke(); }
    for (let gy = 0; gy <= path.h; gy++) { ctx.beginPath(); ctx.moveTo(0, gy * CELL_H); ctx.lineTo(path.w * CELL_W, gy * CELL_H); ctx.stroke(); }
    if (CELL_W * cam.z > 90) {
      ctx.fillStyle = "rgba(255,255,255,.8)";
      ctx.font = `${12 / cam.z}px sans-serif`;
      ctx.shadowColor = "rgba(0,0,0,.9)"; ctx.shadowBlur = 3 / cam.z;
      for (const c of path.cams) {
        const cx = (c.cell % path.w) * CELL_W, cy = Math.floor(c.cell / path.w) * CELL_H;
        ctx.fillText(c.name, cx + 10, cy + 18 / cam.z);
      }
      ctx.shadowBlur = 0;
    }
  }

  // collision lines
  if (document.getElementById("tColl").checked) {
    ctx.lineWidth = 2.5 / cam.z;
    for (const [x1, y1, x2, y2, t] of path.lines) {
      ctx.strokeStyle = LINE_COLORS[t] || "#999";
      ctx.setLineDash(t >= 4 ? [8 / cam.z, 6 / cam.z] : []);
      ctx.beginPath(); ctx.moveTo(dX(x1), dY(y1)); ctx.lineTo(dX(x2), dY(y2)); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // TLVs
  const showLabels = document.getElementById("tLabels").checked && cam.z > 0.45;
  ctx.font = `${11 / cam.z}px sans-serif`;
  for (const t of path.tlvs) {
    const c = catOf(t);
    if (!c.on) continue;
    const x1 = dX(t.x1), y1 = dY(t.y1);
    const w = Math.max(t.x2 - t.x1, 10), h = Math.max(t.y2 - t.y1, 10);
    ctx.strokeStyle = c.color;
    ctx.lineWidth = (t.name === "LCDStatusBoard" ? 3.5 : 2) / cam.z;
    ctx.strokeRect(x1, y1, w, h);
    ctx.fillStyle = c.color + "26";
    ctx.fillRect(x1, y1, w, h);
    if (showLabels) {
      ctx.fillStyle = c.color;
      ctx.fillText(t.name, x1, y1 - 3 / cam.z);
    }
  }

  if (ruler) {
    const dx = ruler.x2 - ruler.x1, dy = ruler.y2 - ruler.y1;
    const len = Math.hypot(dx, dy);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2 / cam.z;
    ctx.setLineDash([6 / cam.z, 5 / cam.z]);
    ctx.beginPath(); ctx.moveTo(ruler.x1, ruler.y1); ctx.lineTo(ruler.x2, ruler.y2); ctx.stroke();
    ctx.setLineDash([]);
    for (const [ex, ey] of [[ruler.x1, ruler.y1], [ruler.x2, ruler.y2]]) {
      ctx.beginPath(); ctx.arc(ex, ey, 3.5 / cam.z, 0, Math.PI * 2); ctx.fillStyle = "#ffffff"; ctx.fill();
    }
    const label = `${Math.round(Math.abs(dx))} × ${Math.round(Math.abs(dy))} · ${Math.round(len)}u ≈ ${(len / 25).toFixed(1)} grid`;
    ctx.font = `${13 / cam.z}px sans-serif`;
    const midx = (ruler.x1 + ruler.x2) / 2, midy = (ruler.y1 + ruler.y2) / 2 - 10 / cam.z;
    ctx.fillStyle = "rgba(14,15,18,.85)";
    const tw = ctx.measureText(label).width;
    ctx.fillRect(midx - tw / 2 - 5 / cam.z, midy - 13 / cam.z, tw + 10 / cam.z, 18 / cam.z);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(label, midx - tw / 2, midy);
  }

  if (flash) {
    const el = performance.now() - flash.t0;
    const a = Math.max(0, 1 - el / 1600);
    ctx.strokeStyle = `rgba(232,163,61,${a})`;
    ctx.lineWidth = 3.5 / cam.z;
    const r = (46 + 10 * Math.sin(el / 110)) / Math.sqrt(cam.z);
    ctx.beginPath(); ctx.arc(flash.x, flash.y, r, 0, Math.PI * 2); ctx.stroke();
  }

  ctx.restore();
}

// boot: over http(s), re-fetch map data with cache disabled so rebuilds show up
// immediately; on file:// fall back to the <script> tag payloads.
async function loadOne(file, fallback) {
  if (location.protocol.startsWith("http")) {
    try {
      const t = await fetch(file, { cache: "no-store" }).then(r => r.ok ? r.text() : null);
      if (t) return JSON.parse(t.slice(t.indexOf("=") + 1).trim().replace(/;$/, ""));
    } catch (e) { /* fall through */ }
  }
  return fallback;
}

Promise.all([
  loadOne("map_data_ao.js", window.MAP_DATA_AO),
  loadOne("map_data_ae.js", window.MAP_DATA_AE),
]).then(datasets => {
  GAMES_DATA = datasets.filter(d => d && d.levels && d.levels.length);
  GAMES_DATA.forEach(G => {
    const b = document.createElement("button");
    b.textContent = G.id;
    b.title = G.game;
    b.onclick = () => selectGame(G, b);
    gameBtns.appendChild(b);
  });
  resize();
  if (!applyHash() && GAMES_DATA.length) selectGame(GAMES_DATA[0], gameBtns.children[0]);
});
</script>
